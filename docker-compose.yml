version: '3.9'

services:
  # PostgreSQL database for storing pentagi data
  postgres:
    image: postgres:16-alpine
    container_name: pentagi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pentagi}
      POSTGRES_USER: ${POSTGRES_USER:-pentagi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentagi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pentagi} -d ${POSTGRES_DB:-pentagi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: pentagi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-pentagi}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pentagi}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Main pentagi backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: pentagi-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - pentagi-network
    # Limit resource usage on my local dev machine
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M

  # Frontend web interface
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: pentagi-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - pentagi-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pentagi-network:
    driver: bridge
